protocol_id: chest_pain_v1
symptom_category: chest_pain
required_fields: [duration_minutes, severity]
red_flags:
  - id: RF-CARDIAC-01
    description: "Chest pain with cardiac warning signs, short duration"
    condition:
      all:
        - { field: duration_minutes, op: "<", value: 60 }
        - { any: [
              { field: associated_symptoms, op: "contains", value: "shortness_of_breath" },
              { field: associated_symptoms, op: "contains", value: "sweating" },
              { field: associated_symptoms, op: "contains", value: "radiating_pain" }
            ] }
    disposition: EMERGENCY
  - id: RF-CARDIAC-02
    description: "Chest pain in a patient with known cardiac history"
    condition:
      all:
        - { field: duration_minutes, op: "<", value: 120 }
        - { field: history_flags, op: "contains", value: "cardiac" }
    disposition: EMERGENCY
disposition_rules:
  - condition: { field: severity, op: "==", value: "mild" }
    disposition: PRIMARY_CARE
  - condition: { field: severity, op: "==", value: "moderate" }
    disposition: URGENT_CARE
  - condition: { field: severity, op: "==", value: "severe" }
    disposition: EMERGENCY
  - condition: { field: default, op: "==", value: true }
    disposition: URGENT_CARE
safety_netting: >
  Seek emergency care immediately if pain worsens, spreads to your arm or jaw,
  or you develop shortness of breath or sweating.