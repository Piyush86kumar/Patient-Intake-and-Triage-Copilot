protocol_id: shortness_of_breath_v1
symptom_category: shortness_of_breath
required_fields: [duration_minutes, severity]
red_flags:
  - id: RF-BREATH-01
    description: "Severe shortness of breath with possible respiratory distress"
    condition:
      all:
        - { field: severity, op: "==", value: "severe" }
        - { any: [
              { field: associated_symptoms, op: "contains", value: "chest_pain" },
              { field: associated_symptoms, op: "contains", value: "wheezing" },
              { field: associated_symptoms, op: "contains", value: "shortness_of_breath" }
            ] }
    disposition: EMERGENCY
disposition_rules:
  - condition: { field: severity, op: "==", value: "mild" }
    disposition: PRIMARY_CARE
  - condition: { field: default, op: "==", value: true }
    disposition: URGENT_CARE
safety_netting: >
  Seek urgent medical care if breathing becomes more difficult, if lips or fingertips turn blue,
  or if you develop chest pain or fainting.
