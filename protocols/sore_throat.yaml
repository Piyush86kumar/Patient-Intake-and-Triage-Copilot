protocol_id: sore_throat_v1
symptom_category: sore_throat
required_fields: [duration_minutes, severity]
red_flags:
  - id: RF-THROAT-01
    description: "Sore throat with difficulty breathing or severe swelling"
    condition:
      all:
        - { field: severity, op: "==", value: "severe" }
        - { any: [
              { field: associated_symptoms, op: "contains", value: "difficulty_swallowing" },
              { field: associated_symptoms, op: "contains", value: "swollen_glands" }
            ] }
    disposition: EMERGENCY
disposition_rules:
  - condition: { field: severity, op: "==", value: "mild" }
    disposition: SELF_CARE
  - condition: { field: severity, op: "==", value: "moderate" }
    disposition: PRIMARY_CARE
  - condition: { field: severity, op: "==", value: "severe" }
    disposition: URGENT_CARE
  - condition: { field: default, op: "==", value: true }
    disposition: URGENT_CARE
safety_netting: >
  Seek care promptly if swallowing becomes very painful, you develop shortness of breath,
  or symptoms are not improving after several days.
